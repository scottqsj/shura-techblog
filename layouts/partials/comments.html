{{- /* Twikoo 评论区 — 服务端: Cloudflare Workers + D1 */ -}}
{{- with .Site.Params.twikoo.envId }}
<div class="twikoo-container">
  <div id="tcomment"></div>
</div>
<script src="https://registry.npmmirror.com/twikoo/{{ $.Site.Params.twikoo.version | default "1.6.44" }}/files/dist/twikoo.all.min.js"></script>
<script>
  twikoo.init({
    envId: {{ . }},
    el: '#tcomment',
    lang: 'zh-CN'
  });
</script>
{{- end }}
